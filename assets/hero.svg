<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <!-- Deep cinematic background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0010"/>
      <stop offset="40%"  stop-color="#0d0025"/>
      <stop offset="70%"  stop-color="#12002f"/>
      <stop offset="100%" stop-color="#060018"/>
    </linearGradient>

    <!-- Radial glow centre -->
    <radialGradient id="centreGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#6c00ff" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#3a007a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Shimmer sweep gradient -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="45%"  stop-color="white" stop-opacity="0"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0.08"/>
      <stop offset="55%"  stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Title text glow filter -->
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft outer glow for subtitle -->
    <filter id="softGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip the whole canvas -->
    <clipPath id="canvasClip">
      <rect width="900" height="320" rx="18"/>
    </clipPath>
  </defs>

  <!-- ── BACKGROUND LAYERS ── -->
  <g clip-path="url(#canvasClip)">
    <!-- Base fill -->
    <rect width="900" height="320" fill="url(#bgGrad)"/>

    <!-- Centre radial glow -->
    <rect width="900" height="320" fill="url(#centreGlow)"/>

    <!-- Parallax-style horizontal bands -->
    <rect x="0" y="0" width="900" height="1" fill="#7c3aed" opacity="0.18"/>
    <rect x="0" y="319" width="900" height="1" fill="#7c3aed" opacity="0.18"/>

    <!-- Animated grid lines (horizontal) -->
    <g opacity="0.07" stroke="#a78bfa" stroke-width="0.5">
      <line x1="0" y1="53"  x2="900" y2="53"/>
      <line x1="0" y1="106" x2="900" y2="106"/>
      <line x1="0" y1="160" x2="900" y2="160"/>
      <line x1="0" y1="213" x2="900" y2="213"/>
      <line x1="0" y1="266" x2="900" y2="266"/>
    </g>
    <!-- Animated grid lines (vertical) -->
    <g opacity="0.07" stroke="#a78bfa" stroke-width="0.5">
      <line x1="90"  y1="0" x2="90"  y2="320"/>
      <line x1="180" y1="0" x2="180" y2="320"/>
      <line x1="270" y1="0" x2="270" y2="320"/>
      <line x1="360" y1="0" x2="360" y2="320"/>
      <line x1="450" y1="0" x2="450" y2="320"/>
      <line x1="540" y1="0" x2="540" y2="320"/>
      <line x1="630" y1="0" x2="630" y2="320"/>
      <line x1="720" y1="0" x2="720" y2="320"/>
      <line x1="810" y1="0" x2="810" y2="320"/>
    </g>

    <!-- ── ANIMATED PARTICLES ── -->
    <!-- Each circle drifts upward and fades -->
    <circle cx="80"  cy="270" r="2" fill="#c084fc" opacity="0">
      <animate attributeName="cy"      from="270" to="50"  dur="6s"  repeatCount="indefinite" begin="0s"/>
      <animate attributeName="opacity" values="0;0.7;0"    dur="6s"  repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle cx="200" cy="290" r="1.5" fill="#818cf8" opacity="0">
      <animate attributeName="cy"      from="290" to="60"  dur="7.5s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0;0.6;0"    dur="7.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="340" cy="300" r="2.5" fill="#e879f9" opacity="0">
      <animate attributeName="cy"      from="300" to="40"  dur="5.5s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0;0.5;0"    dur="5.5s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="500" cy="280" r="1.5" fill="#a78bfa" opacity="0">
      <animate attributeName="cy"      from="280" to="55"  dur="8s"   repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;0.65;0"   dur="8s"   repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="620" cy="295" r="2"   fill="#c084fc" opacity="0">
      <animate attributeName="cy"      from="295" to="45"  dur="6.5s" repeatCount="indefinite" begin="3s"/>
      <animate attributeName="opacity" values="0;0.55;0"   dur="6.5s" repeatCount="indefinite" begin="3s"/>
    </circle>
    <circle cx="760" cy="285" r="1.8" fill="#818cf8" opacity="0">
      <animate attributeName="cy"      from="285" to="65"  dur="7s"   repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;0.6;0"    dur="7s"   repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="850" cy="275" r="2.2" fill="#e879f9" opacity="0">
      <animate attributeName="cy"      from="275" to="35"  dur="5s"   repeatCount="indefinite" begin="4s"/>
      <animate attributeName="opacity" values="0;0.7;0"    dur="5s"   repeatCount="indefinite" begin="4s"/>
    </circle>
    <circle cx="130" cy="250" r="1.2" fill="#a78bfa" opacity="0">
      <animate attributeName="cy"      from="250" to="80"  dur="9s"   repeatCount="indefinite" begin="2.5s"/>
      <animate attributeName="opacity" values="0;0.45;0"   dur="9s"   repeatCount="indefinite" begin="2.5s"/>
    </circle>

    <!-- ── SHIMMER SWEEP ── -->
    <rect width="900" height="320" fill="url(#shimmer)">
      <animateTransform attributeName="transform" type="translate"
        from="-900 0" to="900 0"
        dur="3.5s" repeatCount="indefinite"/>
    </rect>

    <!-- ── DECORATIVE ARC / RING ── -->
    <ellipse cx="450" cy="160" rx="320" ry="110"
             fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.18">
      <animate attributeName="rx" values="320;340;320" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="110;120;110" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.18;0.28;0.18" dur="5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="450" cy="160" rx="370" ry="135"
             fill="none" stroke="#a78bfa" stroke-width="0.4" opacity="0.1">
      <animate attributeName="rx" values="370;350;370" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="135;125;135" dur="7s" repeatCount="indefinite"/>
    </ellipse>

    <!-- ── TITLE "⛓ LangChain" ── -->
    <!-- Glow layer -->
    <text x="450" y="142" text-anchor="middle"
          font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif"
          font-size="68" font-weight="900" letter-spacing="4"
          fill="#c084fc" filter="url(#glow)" opacity="0.5">
      LangChain
      <animate attributeName="opacity" values="0.4;0.75;0.4" dur="3s" repeatCount="indefinite"/>
    </text>
    <!-- Main title -->
    <text x="450" y="142" text-anchor="middle"
          font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif"
          font-size="68" font-weight="900" letter-spacing="4"
          fill="url(#titleGrad)">
      <defs>
        <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#e879f9"/>
          <stop offset="35%"  stop-color="#c084fc"/>
          <stop offset="65%"  stop-color="#818cf8"/>
          <stop offset="100%" stop-color="#38bdf8"/>
          <animateTransform attributeName="gradientTransform" type="translate"
            from="-1" to="1" dur="4s" repeatCount="indefinite" additive="sum"/>
        </linearGradient>
      </defs>
      LangChain
    </text>

    <!-- ── SUBTITLE ── -->
    <text x="450" y="180" text-anchor="middle"
          font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif"
          font-size="16" font-weight="400" letter-spacing="5"
          fill="#a78bfa" filter="url(#softGlow)" opacity="0">
      AI · NODE.JS · GOOGLE GEMINI · PRACTICE
      <animate attributeName="opacity" values="0;0.9;0.9" dur="2s" begin="0.4s"
               fill="freeze" repeatCount="1"/>
    </text>

    <!-- ── TAGLINE ── -->
    <text x="450" y="215" text-anchor="middle"
          font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif"
          font-size="13.5" font-weight="300" letter-spacing="2"
          fill="#7c3aed" opacity="0">
      Exploring the frontier of AI chains — one prompt at a time
      <animate attributeName="opacity" values="0;0.75;0.75" dur="2s" begin="0.8s"
               fill="freeze" repeatCount="1"/>
    </text>

    <!-- ── PRACTICE DISCLAIMER PILL ── -->
    <rect x="330" y="234" width="240" height="30" rx="15"
          fill="#1e003f" stroke="#7c3aed" stroke-width="1" opacity="0.85"/>
    <text x="450" y="254" text-anchor="middle"
          font-family="'Segoe UI', system-ui, sans-serif"
          font-size="12" font-weight="600" letter-spacing="1.5"
          fill="#e879f9">
      ⚡ PRACTICE REPOSITORY ⚡
    </text>

    <!-- ── BOTTOM GRADIENT BAR ── -->
    <rect x="0" y="313" width="900" height="7" rx="0" fill="none">
      <animate attributeName="fill" values="#6c00ff;#a855f7;#38bdf8;#6c00ff"
               dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Thin glowing bottom line -->
    <line x1="0" y1="313" x2="900" y2="313" stroke="#7c3aed" stroke-width="2">
      <animate attributeName="stroke" values="#7c3aed;#c084fc;#38bdf8;#7c3aed"
               dur="4s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
